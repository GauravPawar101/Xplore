name: CI

on:
  push:
    branches: [main, TTS]
  pull_request:
    branches: [main]

#  Required secrets (set in Settings → Secrets → Actions):
#  VITE_CLERK_PUBLISHABLE_KEY  — Clerk publishable key for frontend build

jobs:
  # ─── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    name: Frontend — Typecheck & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          # Clerk key is needed at Vite build time; store as a repo secret.
          # Without it the build still succeeds but Clerk auth is non-functional.
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}

  # ─── Backend lint ──────────────────────────────────────────────────────────
  backend-lint:
    name: Backend — Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        # E/F/W basics; skip line-length (E501) and re-export (F401/F811).
        # W503 is a flake8-only code (line break before binary operator);
        # ruff does not implement it so it must not appear in --ignore.
        run: ruff check backend/ --select E,F,W --ignore E501,F401,F811

  # ─── Backend tests ─────────────────────────────────────────────────────────
  backend-test:
    name: Backend — Tests (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends git

      - name: Install Python dependencies
        run: pip install -r requirements.txt pytest

      - name: Run tests
        run: pytest tests/ -v
        env:
          # Stub env vars so config.py can import without real credentials
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/xplore
          MONGODB_URI: mongodb://localhost:27017
          MILVUS_URI: http://localhost:19530
          CLERK_JWKS_URL: https://example.clerk.accounts.dev/.well-known/jwks.json

  # ─── Docker build ──────────────────────────────────────────────────────────
  docker-build:
    name: Docker — Build backend image
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: xplore-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max